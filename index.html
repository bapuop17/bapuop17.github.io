
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BapuOP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
}

header{
padding:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

h1{
font-size:50px;
color:#00e5ff;
}

p{
margin-top:15px;
font-size:20px;
color:#ddd;
}

.hero{
padding:100px 20px;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#00e5ff;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:30px;
transition:.3s;
}

.btn:hover{
background:#00b8d4;
transform:scale(1.05);
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.card{
background:#1e293b;
padding:25px;
width:280px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,229,255,.2);
}

footer{
padding:30px;
margin-top:40px;
background:#111827;
}
</style>

</head>

<body>

<header>
<h1>BapuOP</h1>
<p>Welcome to My Official Website 🚀</p>
</header>

<section class="hero">
<h2>Create. Learn. Build.</h2>

<a href="#" class="btn">Explore</a>
</section>

<section class="cards">

<div class="card">
<h2>🤖 AI Projects</h2>
<p>Powerful AI tools and automation.</p>
</div>

<div class="card">
<h2>💻 Coding</h2>
<p>Python, Web Development & Apps.</p>
</div>

<div class="card">
<h2>🛡 Cyber Security</h2>
<p>Learn ethical hacking and security.</p>
</div>

</section>

<footer>
<p>© 2026 BapuOP | All Rights Reserved</p>
</footer>

</body>
</html>
